name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rustfmt:
    name: Rust formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Nightly because rustfmt.toml uses nightly-only options
      # (imports_granularity, format_strings). Mirrors `just fmt-check`.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --manifest-path src-tauri/Cargo.toml --check
