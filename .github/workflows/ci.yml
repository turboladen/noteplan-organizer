name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rustfmt:
    name: Rust formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Nightly because rustfmt.toml uses nightly-only options
      # (imports_granularity, format_strings). Mirrors `just fmt-check`.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --manifest-path src-tauri/Cargo.toml --check

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `eslint .` needs no build/typecheck first.
      - name: Lint
        run: bun run lint
